name: Tag On Version Change

on:
  push:
    branches: [ master ]
    paths:
      - 'src/version.h'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    name: Create Release Tag

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate ref
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/master" ]]; then
            echo "This workflow can only run on master." >&2
            exit 1
          fi

      - name: Read version
        id: version
        run: |
          version="$(sed -n 's/^#define VERSION \"\\(v[^"]*\\)\"$/\\1/p' src/version.h)"
          if [ -z "$version" ]; then
            echo "Failed to parse version from src/version.h" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check tag existence
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Skip existing tag
        if: steps.check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.version }} already exists, skipping tag creation."
