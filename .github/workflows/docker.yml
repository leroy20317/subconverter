name: Publish Docker Image

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    name: Build and Push Multi-Arch Image

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release ref
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "This workflow only publishes images for version tags (refs/tags/v*)." >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Resolve image tags
        id: tags
        run: |
          short_sha="${{ steps.vars.outputs.sha_short }}"
          version="${GITHUB_REF#refs/tags/}"
          {
            echo "tags<<EOF"
            echo "${{ env.IMAGE_NAME }}:${version}"
            echo "${{ env.IMAGE_NAME }}:latest"
            echo "${{ env.IMAGE_NAME }}:sha-${short_sha}"
            echo "EOF"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve image labels
        id: labels
        run: |
          {
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}"
            echo "org.opencontainers.image.revision=${{ github.sha }}"
            if [[ -n "${{ steps.tags.outputs.version }}" ]]; then
              echo "org.opencontainers.image.version=${{ steps.tags.outputs.version }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: scripts/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SHA=${{ steps.vars.outputs.sha_short }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.labels.outputs.labels }}

      - name: Generate release notes
        id: release_notes
        env:
          RELEASE_TAG: ${{ steps.tags.outputs.version }}
          RELEASE_CONFIG: .github/release.yml
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          SHA_SHORT: ${{ steps.vars.outputs.sha_short }}
        run: ./.github/scripts/generate-release-notes-from-commits.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.tags.outputs.version }}"
          if gh release view "$version" >/dev/null 2>&1; then
            echo "Release $version already exists, skipping."
          else
            gh release create "$version" \
              --title "$version" \
              --notes-file "${{ steps.release_notes.outputs.path }}"
          fi
