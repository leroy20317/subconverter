name: Publish Docker Image

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  prepare:
    runs-on: ubuntu-24.04
    name: Prepare Release Metadata
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
      version: ${{ steps.tags.outputs.version }}
      labels: ${{ steps.labels.outputs.labels }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release ref
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "This workflow only publishes images for version tags (refs/tags/v*)." >&2
            exit 1
          fi

      - name: Get commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Resolve image tags
        id: tags
        run: |
          version="${GITHUB_REF#refs/tags/}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Resolve image labels
        id: labels
        run: |
          {
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}"
            echo "org.opencontainers.image.revision=${{ github.sha }}"
            if [[ -n "${{ steps.tags.outputs.version }}" ]]; then
              echo "org.opencontainers.image.version=${{ steps.tags.outputs.version }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    name: Build and Push ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: scripts/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: |
            type=gha,scope=subconverter-${{ matrix.arch }}
            type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch }}
          cache-to: |
            type=gha,scope=subconverter-${{ matrix.arch }},mode=max
            type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch }},mode=max
          build-args: |
            SHA=${{ needs.prepare.outputs.sha_short }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:sha-${{ needs.prepare.outputs.sha_short }}-${{ matrix.arch }}
          labels: ${{ needs.prepare.outputs.labels }}

  manifest:
    needs:
      - prepare
      - build
    runs-on: ubuntu-24.04
    name: Publish Multi-Arch Manifest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        run: |
          version="${{ needs.prepare.outputs.version }}"
          sha_short="${{ needs.prepare.outputs.sha_short }}"

          docker buildx imagetools create \
            --tag "${{ env.IMAGE_NAME }}:${version}" \
            --tag "${{ env.IMAGE_NAME }}:latest" \
            --tag "${{ env.IMAGE_NAME }}:sha-${sha_short}" \
            "${{ env.IMAGE_NAME }}:${version}-amd64" \
            "${{ env.IMAGE_NAME }}:${version}-arm64"

  release:
    needs:
      - prepare
      - manifest
    runs-on: ubuntu-24.04
    name: Create GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release_notes
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.version }}
          RELEASE_CONFIG: .github/release.yml
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          SHA_SHORT: ${{ needs.prepare.outputs.sha_short }}
        run: ./.github/scripts/generate-release-notes-from-commits.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.prepare.outputs.version }}"
          if gh release view "$version" >/dev/null 2>&1; then
            echo "Release $version already exists, skipping."
          else
            gh release create "$version" \
              --title "$version" \
              --notes-file "${{ steps.release_notes.outputs.path }}"
          fi
